<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance - Picture by Corentin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2d9d5a64f.js" crossorigin="anonymous"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#0b0b0b;
      color:white;
      overflow:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:radial-gradient(circle, rgba(120,255,180,0.08), transparent 70%);
      top:-200px;
      right:-200px;
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left, rgba(100,255,180,0.05), transparent 40%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 40%);
      pointer-events:none;
      z-index:-1;
    }

    header{
      height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url('https://i.postimg.cc/900rnhWn/DSC-1853.jpg') center/cover fixed;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      animation:backgroundZoom 18s ease-in-out infinite alternate;
    }

    @keyframes backgroundZoom{
      from{ background-size:100%; }
      to{ background-size:110%; }
    }

    .maintenance-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      color: #78ffb4;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.8; }
      to { transform: scale(1.08); opacity: 1; }
    }

    header h1{
      font-size:4rem;
      font-weight:700;
      margin-bottom:15px;
      animation:fadeUp 1s ease;
    }

    header p{
      max-width:600px;
      color:#d0d0d0;
      font-size:1.2rem;
      line-height:1.8;
      animation:fadeUp 1.4s ease;
    }

    .btn{
      margin-top:35px;
      padding:15px 35px;
      border-radius:50px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.15);
      color:white;
      text-decoration:none;
      font-weight:600;
      backdrop-filter:blur(10px);
      transition:0.4s;
      animation:fadeUp 1.8s ease;
      position:relative;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      isolation:isolate;
    }

    .btn::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.18), transparent);
      transform:translateX(-100%);
      transition:0.7s;
      z-index:-1;
    }

    .btn:hover::before{ transform:translateX(100%); }
    .btn:hover{ background:white; color:black; transform:translateY(-5px); }

    @keyframes fadeUp{ from{ opacity:0; transform:translateY(30px); } to{ opacity:1; transform:translateY(0); } }

    @media(max-width:768px){
      header h1{ font-size:2.5rem; }
      header p{ font-size:1rem; }
      .maintenance-icon { font-size:3rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="maintenance-icon">
      <i class="fa-solid fa-camera-rotate"></i>
    </div>
    
    <h1>Site en Maintenance</h1>
    
    <p>
      Le site se refait une beauté ! Je mets actuellement à jour la galerie et les fonctionnalités pour vous offrir une meilleure expérience.
    </p>

    <a href="https://www.instagram.com/picturebycorentin/" target="_blank" class="btn">
      <i class="fa-brands fa-instagram" style="margin-right: 10px;"></i> Rejoindre mon Instagram
    </a>
  </header>

</body>
</html>
